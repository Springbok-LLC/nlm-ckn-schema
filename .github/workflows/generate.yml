name: Generate Artifacts

on:
  push:
    branches:
      - "**"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Makefile
        run: make

      - name: Verify generated artifacts
        run: |
          test -f src/ckn_schema/schema/ckn_schema.yaml
          test -f src/ckn_schema/pydantic/ckn_schema.py
          test -f src/ckn_schema/shacl/ckn_schema.shacl.ttl
          test -f src/ckn_schema/jsonschema/ckn_schema.json
