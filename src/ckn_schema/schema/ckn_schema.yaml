                    A cell type marker gene is a gene that is selectively expressed in cells of a
                    given type and can be reliably used alone or in combination as a canonical
                    characteristic to optimally classify them.
                range: BiomarkerCombination
            predicate:
                name: predicate
                description: >-
                    A relation between a group and another group it is part of but does not fully
                    constitute.
                subproperty_of: subcluster_of
            object:
                name: object
                description: A collection of discontinuous sequences.
                range: BinaryGeneSet
        defining_slots:
            - subject
            - predicate
            - object

    CellSetExpressesBinaryGeneSet:
        description: A relationship between a cell set and a set of binary genes that it expresses.
        is_a: Association
        slot_usage:
            subject:
                name: subject
                description: A collection of cells that have some common property.
                range: CellSet
            predicate:
                name: predicate
                description: >-
                    relation between some biological entity and a gene that is the input of some
                    gene expression process
                subproperty_of: expresses
            object:
                name: object
                description: A collection of discontinuous sequences.
                range: BinaryGeneSet
        defining_slots:
            - subject
            - predicate
            - object

    ProteinCapableOfMolecularFunction:
        description: >-
            A relationship between a protein and a molecular function that it is directly
            involved in carrying out.
        is_a: Association
        slot_usage:
            subject:
                name: subject
                description: >-
                    An amino acid chain that is canonically produced de novo by ribosome-mediated
                    translation of a genetically-encoded mRNA, and any derivatives thereof
                range: Protein
            predicate:
                name: predicate
                description: >-
                    A relation between a material entity (such as a cell) and a process, in which
                    the material entity has the ability to carry out the process.
                subproperty_of: capable_of
            object:
                name: object
                description: >-
                    A molecular process that can be carried out by the action of a single
                    macromolecular machine, usually via direct physical interactions with other
                    molecular entities. Function in this sense denotes an action, or activity, that
                    a gene product (or a complex) performs.
                range: MolecularFunction
        defining_slots:
            - subject
            - predicate
            - object

    ProteinInvolvedInBiologicalProcess:
        description: >-
            A relationship between a protein and a biological process that it is directly
            involved in carrying out.
        is_a: Association
        slot_usage:
            subject:
                name: subject
                description: >-
                    An amino acid chain that is canonically produced de novo by ribosome-mediated
                    translation of a genetically-encoded mRNA, and any derivatives thereof
                range: Protein
            predicate:
                name: predicate
                description: >-
                    A relation between a material entity and a process in which the material entity
                    enables some subprocess that is part of the larger process.
                subproperty_of: involved_in
            object:
                name: object
                description: >-
                    A biological process is the execution of a genetically-encoded biological module
                    or program. It consists of all the steps required to achieve the specific
                    biological objective of the module. A biological process is accomplished by a
                    particular set of molecular functions carried out by specific gene products (or
                    macromolecular complexes), often in a highly regulated manner and in a
                    particular temporal sequence.
                range: BiologicalProcess
        defining_slots:
            - subject
            - predicate
            - object

    ProteinLocatedInCellularComponent:
        description: >-
            A relationship between a protein and a cellular component that is a constituent
            part of it.
        is_a: Association
        slot_usage:
            subject:
                name: subject
                description: >-
                    An amino acid chain that is canonically produced de novo by ribosome-mediated
                    translation of a genetically-encoded mRNA, and any derivatives thereof
                range: Protein
            predicate:
                name: predicate
                description: >-
                    A relation between two independent continuants, the target and the location, in
                    which the target is entirely within the location
                subproperty_of: located_in
            object:
                name: object
                description: >-
                    A location, relative to cellular compartments and structures, occupied by a
                    macromolecular machine. There are three types of cellular components described
                    in the gene ontology: (1) the cellular anatomical entity where a gene product
                    carries out a molecular function (e.g., plasma membrane, cytoskeleton) or
                    membrane-enclosed compartments (e.g., mitochondrion); (2)virion components,
                    where viral proteins act, and (3) the stable macromolecular complexes of which
                    gene product are parts (e.g., the clathrin complex).
                range: CellularComponent
        defining_slots:
            - subject
            - predicate
            - object

    CellSetDatasetIsAboutAnatomicalStructure:
        description: >-
            A relationship between a cell set dataset and an anatomical structure that some of its data pertain to.
        is_a: Association
        slot_usage:
            subject:
                name: subject
                description: A dataset that is about cells taken from one or more tissue samples.
                range: CellSetDataset
            predicate:
                name: predicate
                description: A primitive relation that relates an information artifact to an entity.
                subproperty_of: is_about
            object:
                name: object
                description: >-
                    Material anatomical entity that is a single connected structure with inherent 3D
                    shape generated by coordinated expression of the organism's own genome.
                range: AnatomicalStructure
        defining_slots:
            - subject
            - predicate
            - object

    CellSetExpressesGene:
        description: A relationship between a cell set and a gene that it expresses.
        is_a: Association
        slot_usage:
            subject:
                name: subject
                description: A collection of cells that have some common property.
                range: CellSet
            predicate:
                name: predicate
                description: >-
                    relation between some biological entity and a gene that is the input of some
                    gene expression process
                subproperty_of: expresses
            object:
                name: object
                description: >-
                    A region (or regions) that includes all of the sequence elements necessary to
                    encode a functional transcript. A gene may include regulatory regions,
                    transcribed regions and/or other functional sequence regions.
                range: Gene
        defining_slots:
            - subject
            - predicate
            - object

